<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Management — KashTek</title>
  <meta name="description" content="KashTek Event Management — coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --color-fog:#f4f1eb;
      --color-mist:#ece8e0;
      --color-stone:#d4cfc6;
      --color-driftwood:#b8b1a4;
      --color-cedar:#2d2a24;
      --color-bark:#1a1816;
      --color-forest:#3d6b4f;
      --color-forest-dim:rgba(61,107,79,0.1);
      --color-plum:#4e3d6e;
      --color-moss:#7a9e7e;
      --font-display:'DM Serif Display',Georgia,'Times New Roman',serif;
      --font-body:'Inter',system-ui,-apple-system,sans-serif;
      --space-sm:1rem;
      --space-md:2rem;
      --space-lg:4rem;
      --text-sm:0.8125rem;
      --text-base:clamp(0.9375rem,0.9rem + 0.2vw,1rem);
      --text-lg:clamp(1.0625rem,1rem + 0.3vw,1.1875rem);
      --text-2xl:clamp(1.75rem,1.2rem + 2.5vw,3rem);
      --text-hero:clamp(2.75rem,1.5rem + 5.5vw,6rem);
      --duration-normal:400ms;
      --ease-out:cubic-bezier(0.16,1,0.3,1);
    }

    html{scroll-behavior:smooth}

    body{
      font-family:var(--font-body);
      background:var(--color-fog);
      color:var(--color-cedar);
      line-height:1.65;
      -webkit-font-smoothing:antialiased;
    }

    body::after{
      content:'';
      position:fixed;inset:0;z-index:9999;
      pointer-events:none;
      opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    a{color:var(--color-forest);text-decoration:none;transition:color var(--duration-normal) var(--ease-out)}
    a:hover{color:var(--color-plum)}

    /* ── NAV ─────────────────────────────── */
    .nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:var(--space-sm) var(--space-md);
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(244,241,235,0.9);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(45,42,36,0.06);
    }
    .nav-brand{display:flex;align-items:center;gap:0.75rem;text-decoration:none}
    .nav-logo{width:40px;height:40px;border-radius:6px;object-fit:contain}
    .nav-wordmark{
      font-family:var(--font-display);
      font-size:1.375rem;
      color:var(--color-cedar);
      letter-spacing:-0.01em;
    }
    .nav-wordmark span{color:var(--color-forest)}
    .nav-links{display:flex;gap:var(--space-md);list-style:none}
    .nav-links a{
      color:var(--color-driftwood);
      font-size:var(--text-sm);
      font-weight:500;
      text-transform:uppercase;
      letter-spacing:0.12em;
      transition:color var(--duration-normal) var(--ease-out);
    }
    .nav-links a:hover{color:var(--color-forest)}
    .nav-links a.active{color:var(--color-forest)}
    .nav-toggle{display:none;background:none;border:none;color:var(--color-cedar);font-size:1.5rem;cursor:pointer;padding:0.25rem}

    /* ── COMING SOON ─────────────────────── */
    .coming-soon{
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;
      padding:var(--space-lg) var(--space-md);
    }
    .coming-soon-icon{
      width:80px;height:80px;
      display:flex;align-items:center;justify-content:center;
      background:var(--color-forest-dim);
      border-radius:20px;
      color:var(--color-forest);
      margin-bottom:var(--space-md);
    }
    .coming-soon-icon svg{width:40px;height:40px}
    .coming-soon h1{
      font-family:var(--font-display);
      font-size:var(--text-hero);
      font-weight:400;
      line-height:1.05;
      margin-bottom:var(--space-sm);
      letter-spacing:-0.02em;
    }
    .coming-soon h1 em{
      font-style:italic;
      color:var(--color-forest);
    }
    .coming-soon p{
      font-size:var(--text-lg);
      color:rgba(45,42,36,0.65);
      max-width:480px;
      line-height:1.7;
      margin-bottom:var(--space-lg);
    }
    .back-link{
      display:inline-flex;align-items:center;gap:0.5rem;
      font-size:var(--text-sm);
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:0.08em;
      color:var(--color-forest);
      transition:color var(--duration-normal) var(--ease-out);
    }
    .back-link:hover{color:var(--color-plum)}

    /* ── RESPONSIVE ───────────────────────── */
    @media(max-width:768px){
      .nav-links{
        display:none;
        position:absolute;top:100%;left:0;right:0;
        flex-direction:column;
        background:rgba(244,241,235,0.97);
        backdrop-filter:blur(16px);
        -webkit-backdrop-filter:blur(16px);
        padding:var(--space-md);
        gap:var(--space-sm);
        border-bottom:1px solid rgba(45,42,36,0.06);
      }
      .nav-links.open{display:flex}
      .nav-toggle{display:block}
    }

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{
        transition-duration:0.01ms !important;
        animation-duration:0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" aria-label="Main navigation">
    <a href="index.html" class="nav-brand">
      <img src="logo.jpg" alt="KashTek logo" class="nav-logo" width="40" height="40">
      <span class="nav-wordmark">Kash<span>Tek</span></span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="events.html" class="active">Events</a></li>
      <li><a href="mailto:info.kashtek@gmail.com">Contact</a></li>
    </ul>
  </nav>

  <!-- COMING SOON -->
  <main class="coming-soon">
    <div class="coming-soon-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/></svg>
    </div>
    <h1><em>Event Management</em></h1>
    <p>We're building something new. Our event management services are on the way — stay tuned.</p>
    <a href="index.html" class="back-link">&larr; Back to Home</a>
  </main>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      var links = document.querySelector('.nav-links');
      var expanded = this.getAttribute('aria-expanded') === 'true';
      links.classList.toggle('open');
      this.setAttribute('aria-expanded', String(!expanded));
    });
  </script>

</body>
</html>
